{% set version = "6.3.10rc1" %}
{% set tag = "6.3.10" %}
{% set siriusDistDir = "sirius_gui_dist" %}

package:
  name: sirius-ms
  version: "{{ version }}"

source:
  # Pre-release: the conda package version carries the `rc1` suffix (sorts below the eventual
  # stable 6.3.10) while the source still comes from the actual upstream git tag `v6.3.10`.
  - url: https://github.com/sirius-ms/sirius/archive/refs/tags/v{{ tag }}.zip
    sha256: 075af1c55f3d7c706948d5bb346a2b94b682f74bc4e4894e829a70e250cd64e2

build:
#  skip: {{ ('linux' in target_platform and 'aarch64' in target_platform) or ('ppc64le' in target_platform) }}
  skip: {{ ('ppc64le' in target_platform) }}
  number: 0
  script_env:
    - siriusDistName={{ siriusDistDir }}-sirius
    - siriusDistDir={{ siriusDistDir }}

requirements:
  build:
    # openjdk 25 is required for the Project Leyden AOT flags used by the launcher
    # (-XX:AOTCacheOutput / -XX:AOTCache, JEP 483/514) and the `aot-train` tool.
    - openjdk 25.*
  run:
    - openjdk 25.*
    - coin-or-cbc 2.10.*  # [not win]

test:
  requires:
    - wget  # [not win]

about:
  home: https://github.com/sirius-ms/sirius
  license: AGPL-3.0-only
  license_file:
    - sirius_dist/{{ siriusDistDir }}/build/install/{{ siriusDistDir }}-sirius/COPYING.txt
    - sirius_dist/{{ siriusDistDir }}/build/install/{{ siriusDistDir }}-sirius/LICENSE.txt
    - sirius_dist/{{ siriusDistDir }}/build/install/{{ siriusDistDir }}-sirius/licenses.md
  summary: 'SIRIUS (CLI + GUI) LC-MS/MS data analyses framework. Includes: SIRIUS, ZODIAC, CSI:FingerID (with COSMIC) and CANOPUS'
  description: SIRIUS is a java-based software framework for the analysis of LC-MS/MS data of metabolites and other small molecules of biological interest. SIRIUS integrates a collection of our tools, including CSI:FingerID (with COSMIC), ZODIAC and CANOPUS.  In particular, both the graphical user interface and the 
    command line version of SIRIUS seamlessly integrate the CSI:FingerID and CANOPUS web services.
  doc_url: https://v6.docs.sirius-ms.io/
  dev_url: https://github.com/sirius-ms/sirius

extra:
  recipe-maintainers:
    - mfleisch
